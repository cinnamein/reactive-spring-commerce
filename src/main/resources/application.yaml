spring:
  application:
    name: reactive-spring-commerce

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:commerce}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    pool:
      enabled: true
      initial-size: 10
      max-size: 50
      max-idle-time: 30m
      validation-query: SELECT 1


  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

logging:
  level:
    cinnamein: DEBUG
    org.springframework.r2dbc: DEBUG
